<style>.glass-panel {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

<body class="bg-background font-body-base text-on-background min-h-screen flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Background Texture with Overlay -->
<div class="absolute inset-0 bg-education-texture z-0" data-alt="A sophisticated wide shot of a modern, bright university library interior with large windows and clean wooden surfaces. The lighting is soft and airy, creating a professional and calm academic atmosphere. The color palette features warm woods and soft whites, with a high-key light mode aesthetic that feels secure and premium."></div>
<div class="absolute inset-0 bg-primary/10 backdrop-blur-[2px] z-10"></div>
<main class="relative z-20 w-full max-w-[440px]">
<div class="glass-panel rounded-[32px] p-stack-lg shadow-2xl shadow-primary/10 flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-stack-lg text-center">
<div class="w-20 h-20 bg-primary-container rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20 mx-auto">
<span class="material-symbols-outlined text-white text-4xl" data-icon="school">school</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Control AndréSán 2026</h1>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-[0.15em]">Plataforma de Gestión Académica</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-stack-md">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-outline ml-1" for="username">USUARIO</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="person">person</span>
<input class="w-full bg-white/50 border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-xl py-4 pl-12 pr-4 transition-all duration-200 outline-none font-body-base text-on-surface" id="username" placeholder="Ingrese su usuario" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-outline ml-1" for="password">CONTRASEÑA</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-white/50 border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-xl py-4 pl-12 pr-4 transition-all duration-200 outline-none font-body-base text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-2">
<label class="flex items-center space-x-2 cursor-pointer">
<input class="rounded border-outline-variant text-primary focus:ring-primary bg-white/50" type="checkbox"/>
<span class="font-label-caps text-[11px] text-on-surface-variant">RECORDAR SESIÓN</span>
</label>
<a class="font-label-caps text-[11px] text-primary hover:underline" href="#">¿OLVIDÓ SU CLAVE?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded-2xl shadow-xl shadow-primary/30 hover:shadow-primary/40 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Iniciar Sesión</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Meta -->
<div class="mt-stack-lg pt-stack-lg border-t border-white/30 w-full text-center">
<p class="font-body-base text-[13px] text-on-surface-variant">
                    Protegido por encriptación de grado institucional.
                </p>
<div class="flex items-center justify-center gap-4 mt-4">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px] text-outline" data-icon="verified_user">verified_user</span>
<span class="font-label-caps text-[10px] text-outline">SECURE PORTAL</span>
</div>
<div class="w-1 h-1 bg-outline-variant rounded-full"></div>
<span class="font-label-caps text-[10px] text-outline">VERSIÓN 2026.1.0</span>
</div>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-secondary-container/20 rounded-full blur-3xl z-[-1]"></div>
<div class="absolute -bottom-12 -left-12 w-48 h-48 bg-primary/20 rounded-full blur-3xl z-[-1]"></div>
</main>
<!-- Support Message -->
<div class="fixed bottom-margin-safe left-0 right-0 text-center z-20">
<p class="font-body-base text-[12px] text-on-surface/60">
            ¿Necesita ayuda? Contacte a <span class="text-primary font-semibold">Soporte Técnico Institucional</span>
</p>
</div>
